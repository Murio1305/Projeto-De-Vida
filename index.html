<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Metas 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">

    <div class="perfil">
        <img src="perfil.jpg" alt="Foto de perfil">
    </div>

    <div class="info">
        <h1>Murilo Cage Rosa</h1>
        <p>Tenho 17 anos e essas são algumas das minhas metas.</p>
    </div>

</header>

<main>

    <section class="goal">
        <div class="left">
            <h2>📘 Tirar o Passaporte</h2>
            <p>Concluir em até 3 meses</p>
        </div>
        <div class="right">
            <div id="timer1" class="timer"></div>
            <div id="percent1" class="percent"></div>
            <div class="progress-container">
                <div id="progress1" class="progress-bar"></div>
            </div>
        </div>
    </section>

    <section class="goal">
        <div class="left">
            <h2>📚 Estudar até o ENEM</h2>
            <p>Meta em andamento</p>
        </div>
        <div class="right">
            <div id="timer2" class="timer"></div>
            <div id="percent2" class="percent"></div>
            <div class="progress-container">
                <div id="progress2" class="progress-bar"></div>
            </div>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Murilo Cage Rosa</p>
</footer>

<script src="script.js"></script>

</body>
</html>
